<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Rastreador de Água</title>
<style>
body {
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 20px;
  background: transparent;
}

h2 {
  color: #0077b6;
  font-size: 16px;
  margin-bottom: 10px;
}

/* Copo compacto */
.copo {
  width: 60px;
  height: 200px;
  border: 2px solid #0077b6;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  background: #f0f0f0;
  margin-bottom: 15px;
}

/* Água */
.agua {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0;
  background: linear-gradient(to top, #0096c7, #48cae4);
  transition: height 0.3s;
  overflow: hidden;
  border-radius: 0 0 8px 8px;
}

/* Bolhas discretas */
.bolha {
  position: absolute;
  bottom: 0;
  width: 4px;
  height: 4px;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  animation: subir 2s linear infinite;
  opacity: 0.8;
}

@keyframes subir {
  0% { transform: translateY(0) scale(1); opacity: 0.8; }
  100% { transform: translateY(-200px) scale(0.5); opacity: 0; }
}

/* Inputs compactos */
input, button {
  padding: 5px;
  font-size: 12px;
  margin: 3px;
  border-radius: 4px;
  border: 1px solid #0077b6;
}

button {
  background: #0077b6;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #0096c7;
}
</style>
</head>
<body>

<h2>Meta: 2 Litros de Água</h2>

<div class="copo">
  <div class="agua" id="agua"></div>
</div>

<label>Adicionar água (ml): </label>
<input type="number" id="ml" min="1" step="1">
<button onclick="adicionarAgua()">Adicionar</button>

<p>Total: <span id="total">0</span> ml</p>

<script>
const capacidade = 2000; // 2 litros
let total = 0;

const agua = document.getElementById('agua');
const totalSpan = document.getElementById('total');

function adicionarAgua() {
  const ml = parseInt(document.getElementById('ml').value);
  if (!ml || ml <= 0) return;

  total += ml;
  if (total > capacidade) total = capacidade;

  const altura = (total / capacidade) * 100;
  agua.style.height = altura + '%';
  totalSpan.textContent = total;

  criarBolhas(ml);
}

function criarBolhas(ml) {
  for (let i = 0; i < Math.min(ml/20, 5); i++) { // max 5 bolhas por clique
    const bolha = document.createElement('div');
    bolha.classList.add('bolha');
    bolha.style.left = Math.random() * 100 + '%';
    bolha.style.width = 3 + Math.random()*3 + 'px';
    bolha.style.height = bolha.style.width;
    bolha.style.animationDuration = 1.5 + Math.random()*1 + 's';
    agua.appendChild(bolha);

    setTimeout(() => {
      bolha.remove();
    }, 2000);
  }
}
</script>

</body>
</html>
